<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="shortcut icon" href="favicon.svg">
  <link rel="apple-touch-icon" href="favicon.svg">
  <title>Pink老师前端课程知识库</title>
  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
  <div class="app-shell">
    <button class="mobile-menu-btn" id="mobileMenuBtn" type="button" aria-controls="sidebar" aria-expanded="false">目录</button>
    <button class="back-to-top" id="backToTopBtn" type="button" aria-label="返回顶部" title="返回顶部">↑</button>
    <div class="drawer-backdrop" id="drawerBackdrop"></div>
    <aside class="sidebar" id="sidebar">
      <div class="drawer-head">
        <strong>搜索与目录</strong>
        <button class="drawer-close" id="drawerCloseBtn" type="button" aria-label="关闭目录">×</button>
      </div>
      <button class="sidebar-toggle" id="sidebarToggleBtn" type="button" aria-label="折叠侧边栏" aria-expanded="true"></button>
      <div class="brand">
        <h1>Pink老师前端知识库</h1>
        <p>根据本地课程代码、PDF 笔记目录和示例文件整理，支持搜索、展开和亮暗主题。</p>
      </div>

      <div class="search-box">
        <label class="search-row" title="搜索知识点、属性、标签、课程案例">
          <span aria-hidden="true">搜索</span>
          <input id="search" type="search" placeholder="试试搜索 表单">
        </label>
        <div class="toolbar">
          <button class="btn" id="themeBtn" type="button">切换暗色</button>
          <button class="btn" id="clearBtn" type="button">清空搜索</button>
          <button class="btn" id="expandBtn" type="button">全部展开</button>
          <button class="btn" id="collapseBtn" type="button">全部收起</button>
        </div>
      </div>

      <div class="stats">
        <div class="stat"><strong id="nodeCount">0</strong><span>知识点</span></div>
        <div class="stat"><strong id="matchCount">0</strong><span>搜索结果</span></div>
      </div>

      <p class="toc-title">课程章节</p>
      <div class="search-results is-hidden" id="searchResults" aria-live="polite">
        <div class="search-results-title">搜索结果（点击跳转）</div>
        <div class="search-result-list" id="searchResultList"></div>
      </div>

      <ul class="toc" id="toc"></ul>
    </aside>

    <main>
      <div class="topbar">
        <div>
          <h2>Pink老师前端知识库</h2>
          <p class="hint"><a class="video-link" href="https://www.bilibili.com/video/BV1MvaVzUEuz" target="_blank" rel="noopener noreferrer">2025版pink老师最新AI+前端入门教程</a></p>
        </div>
      </div>
      <div class="reading-pin is-hidden" id="readingPin" aria-live="polite">
        <strong>当前位置</strong>
        <span id="readingPinText">可展开的前端学习地图</span>
      </div>
      <div class="chips" id="topicChips">
        <button type="button" class="chip" data-section="HTML5 语义标签">HTML5 语义标签</button>
        <button type="button" class="chip" data-section="CSS3 核心技术">CSS3 核心技术</button>
        <button type="button" class="chip" data-section="现代网页布局">Flex / Grid / 定位</button>
        <button type="button" class="chip" data-section="交互动效设计">Transform / Transition / Animation</button>
        <button type="button" class="chip" data-section="前沿技术拓展">SVG / clip-path / filter</button>
        <button type="button" class="chip" data-section="移动网页开发">移动端 / 响应式 / Bootstrap</button>
      </div>
      <section class="mindmap-panel" aria-label="课程思维导图">
        <div class="mindmap-title">
          <h3>课程思维导图</h3>
          <span>点击节点可跳转到对应知识点</span>
        </div>
        <div class="course-map" id="courseMap"></div>
      </section>
      <div class="empty" id="empty">没有找到匹配的知识点，换一个关键词试试。</div>
      <section class="tree" id="tree" aria-label="知识点树"></section>
    </main>
  </div>

  <script src="assets/js/knowledge.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
